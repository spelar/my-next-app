name: Deploy with Blue/Green

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

      - name: Test (vitest)
        run: pnpm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create .env.production from secrets
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > .env.production

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-next-app:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Blue/Green Deploy on server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/my-next-app:latest"
            NGINX_CONF="/etc/nginx/conf.d/my-next-app.conf"

            # 현재 nginx가 바라보는 포트 추출 (없으면 빈 값 → else 분기)
            CUR_PORT=$(grep -o 'proxy_pass http://localhost:[0-9]*' $NGINX_CONF | grep -o '[0-9]*' || true)

            if [ "$CUR_PORT" = "3001" ]; then
              NEW_PORT=3002; OLD_NAME=my-next-app-blue; NEW_NAME=my-next-app-green
            else
              NEW_PORT=3001; OLD_NAME=my-next-app-green; NEW_NAME=my-next-app-blue
            fi

            echo "[배포] 현재 포트 $CUR_PORT → 새 컨테이너 $NEW_NAME ($NEW_PORT)"

            # 1) 새 이미지 pull
            docker pull "$IMAGE"

            # 2) 동명/이전 실패 잔재 컨테이너 제거 (멱등성 확보 — 이름 충돌 방지)
            docker rm -f "$NEW_NAME" 2>/dev/null || true

            # 3) 새 컨테이너 기동 (카카오 키는 런타임 주입)
            docker run -d --name "$NEW_NAME" -p "$NEW_PORT":3000 \
              -e KAKAO_API_KEY="${{ secrets.KAKAO_API_KEY }}" \
              "$IMAGE"

            # 4) 헬스체크 — 최대 30초. 실패하면 nginx를 바꾸지 않고 롤백(무중단 보장)
            OK=0
            for i in $(seq 1 15); do
              if curl -fs "http://localhost:$NEW_PORT/" >/dev/null; then OK=1; break; fi
              sleep 2
            done
            if [ "$OK" != "1" ]; then
              echo "[실패] 새 컨테이너 헬스체크 실패 → 롤백(기존 유지)"
              docker logs --tail 50 "$NEW_NAME" || true
              docker rm -f "$NEW_NAME" || true
              exit 1
            fi

            # 5) nginx proxy_pass 포트 교체 후 문법 검증하고 reload
            sed -i "s#localhost:$CUR_PORT#localhost:$NEW_PORT#g" "$NGINX_CONF"
            sudo nginx -t
            sudo nginx -s reload

            # 6) 이전 컨테이너 정리
            docker rm -f "$OLD_NAME" 2>/dev/null || true

            # 7) 태그 없는 이미지 정리
            docker image prune -f || true
