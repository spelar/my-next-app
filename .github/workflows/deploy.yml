name: Deploy with Blue/Green

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

      - name: Test (vitest)
        run: pnpm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create .env.production from secrets
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > .env.production

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-next-app:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Blue/Green Deploy on server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/my-next-app:latest"
            NGINX_CONF="/etc/nginx/conf.d/my-next-app.conf"

            # нҳ„мһ¬ nginxк°Җ л°”лқјліҙлҠ” нҸ¬нҠё м¶”м¶ң
            CUR_PORT=$(grep -o 'proxy_pass http://localhost:[0-9]*' $NGINX_CONF | grep -o '[0-9]*')

            if [ "$CUR_PORT" = "3001" ]; then
              NEW_PORT=3002
              OLD_NAME=my-next-app-blue
              NEW_NAME=my-next-app-green
            else
              NEW_PORT=3001
              OLD_NAME=my-next-app-green
              NEW_NAME=my-next-app-blue
            fi

            echo "[л°°нҸ¬] $OLD_NAME ($CUR_PORT) вҶ’ $NEW_NAME ($NEW_PORT)"

            # 1. мғҲ мқҙлҜём§Җ pull
            docker pull $IMAGE

            # 2. мғҲ м»Ён…Ңмқҙл„Ҳ лқ„мҡ°кё° (м№ҙм№ҙмҳӨ нӮӨлҠ” лҹ°нғҖмһ„ мЈјмһ… вҖ” мқҙлҜём§Җм—җ көҪм§Җ м•ҠмқҢ)
            docker run -d --name $NEW_NAME -p $NEW_PORT:3000 \
              -e KAKAO_API_KEY="${{ secrets.KAKAO_API_KEY }}" \
              $IMAGE

            # 3. health check (10мҙҲ мқҙлӮҙ OK мқ‘лӢө)
            for i in {1..10}; do
              curl -fs http://localhost:$NEW_PORT/ && break || sleep 1
            done

            # 4. nginx proxy_pass нҸ¬нҠё көҗмІҙ
            sed -i "s/$CUR_PORT/$NEW_PORT/g" $NGINX_CONF
            sudo nginx -s reload

            # 5. мқҙм „ м»Ён…Ңмқҙл„Ҳ м •лҰ¬
            docker stop $OLD_NAME || true
            docker rm $OLD_NAME || true

            # 6. мӮ¬мҡ©н•ҳм§Җ м•ҠлҠ” мқҙлҜём§Җ(нғңк·ё м—ҶлҠ” мқҙлҜём§Җ) м •лҰ¬
            docker image prune -f
